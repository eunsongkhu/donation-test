<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeGive 연구 대시보드 (Admin)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8f9fa; margin: 0; padding: 30px; color: #333; }
        h1 { margin-bottom: 25px; font-size: 24px; color: #1e293b; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; color: #64748b; font-weight: 500; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #0f172a; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        th, td { padding: 12px 15px; text-align: left; font-size: 14px; }
        th { background: #f1f5f9; color: #475569; font-weight: 700; border-bottom: 2px solid #e2e8f0; }
        td { border-bottom: 1px solid #f1f5f9; }
        tr:last-child td { border-bottom: none; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge.true { background: #dcfce7; color: #166534; }
        .badge.false { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <h1>📊 WeGive 연구 데이터 분석 대시보드</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>총 방문자 수 (실험자수)</h3>
            <div id="stat-visits" class="value">0명</div>
        </div>
        <div class="stat-card">
            <h3>총 기부 완료 인원</h3>
            <div id="stat-donations" class="value">0명</div>
        </div>
        <div class="stat-card">
            <h3>사용 내역 확인 인원</h3>
            <div id="stat-checked" class="value" style="color: #4361ee;">0명</div>
        </div>
        <div class="stat-card">
            <h3>사용 내역 확인 비율</h3>
            <div id="stat-ratio" class="value" style="color: #2a9d8f;">0%</div>
        </div>
    </div>

    <h2>📋 실시간 원시 데이터 로그</h2>
    <table>
        <thead>
            <tr>
                <th>시간</th>
                <th>할당된 기부 방식</th>
                <th>성별 / 연령</th>
                <th>기부 완료 여부</th>
                <th>사용 내역 확인 여부</th>
                <th>만족도 점수</th>
                <th>가장 선호하는 방식</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
            <tr><td colspan="7" style="text-align:center; color:#999;">데이터를 로딩 중입니다...</td>
        </tbody>
    </table>

<script>
    // 파이어베이스 설정값 연동
    const firebaseConfig = {
        apiKey: "AIzaSyDh2Rin87cRXVxf5eTidxnrO93x0M7e4Dc",
        authDomain: "globalcitizenship-271c4.firebaseapp.com",
        projectId: "globalcitizenship-271c4",
        storageBucket: "globalcitizenship-271c4.firebasestorage.app",
        messagingSenderId: "360209413011",
        appId: "1:360209413011:web:d4715a7bf7ec2daf056e66"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 실시간 데이터 수신 스크립트
    db.collection("donations").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
        let totalVisits = 0;
        let totalDonations = 0;
        let totalCheckedUsage = 0;
        let tableHtml = '';

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            totalVisits++;
            
            if (data.hasDonated === true) totalDonations++;
            if (data.checkedUsageHistory === true) totalCheckedUsage++;

            // 시간 포맷 가공
            let timeStr = "-";
            if (data.timestamp) {
                const d = data.timestamp.toDate();
                timeStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
            }

            tableHtml += `
                <tr>
                    <td>${timeStr}</td>
                    <td><strong>${data.type || '미정'}</strong></td>
                    <td>${data.gender || '미입력'} / ${data.age || '미입력'}</td>
                    <td><span class="badge ${data.hasDonated}">${data.hasDonated ? '완료' : '미완료'}</span></td>
                    <td><span class="badge ${data.checkedUsageHistory}">${data.checkedUsageHistory ? '확인함' : '안 봄'}</span></td>
                    <td>${data.rating ? '★ ' + data.rating : '-'}</td>
                    <td>${data.bestType || '-'}</td>
                </tr>
            `;
        });

        // 상단 요약 수치 반영
        document.getElementById('stat-visits').innerText = totalVisits + '명';
        document.getElementById('stat-donations').innerText = totalDonations + '명';
        document.getElementById('stat-checked').innerText = totalCheckedUsage + '명';
        
        const ratio = totalVisits > 0 ? ((totalCheckedUsage / totalVisits) * 100).toFixed(1) : 0;
        document.getElementById('stat-ratio').innerText = ratio + '%';

        // 테이블 본문 교체
        document.getElementById('data-table-body').innerHTML = tableHtml || `<tr><td colspan="7" style="text-align:center;">데이터가 없습니다.</td></tr>`;
    });
</script>
</body>
</html>
