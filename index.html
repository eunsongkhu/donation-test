<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기부 플랫폼 UX 테스트</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-color: #4361ee;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .hidden { display: none !important; }
        h2 { margin-top: 0; color: #333; font-size: 22px; }
        p { color: #666; font-size: 14px; line-height: 1.6; }
        
        /* 폼 및 버튼 스타일 */
        select, button, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #304ece; }
        
        /* 기부 커스텀 UI */
        .donation-box {
            background: #f1f3f9;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: bold;
            color: #222;
        }

        /* 팝업(모달) 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-top: 0; font-size: 18px; color: #d62828; }

        /* 라디오 버튼 스타일 */
        .gender-group {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
        }
        .gender-group label {
            cursor: pointer;
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 40%;
            font-size: 14px;
        }
        .gender-group input[type="radio"] { display: none; }
        .gender-group input[type="radio"]:checked + label {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 체크박스 스타일 */
        .consent-box {
            display: flex;
            align-items: flex-start;
            text-align: left;
            margin: 15px 0;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }
        .consent-box input[type="checkbox"] { width: auto; margin: 3px 10px 0 0; cursor: pointer; }
        .consent-box label { font-size: 12px; color: #555; line-height: 1.4; cursor: pointer; }

        /* 별점 스타일 */
        .stars {
            display: flex;
            justify-content: center;
            direction: rtl;
            font-size: 32px;
            margin: 15px 0;
        }
        .stars input { display: none; }
        .stars label { color: #ddd; cursor: pointer; transition: color 0.2s; }
        .stars label:hover, .stars label:hover ~ label,
        .stars input:checked ~ label { color: #ffd700; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-donation">
        <h2 id="donation-title">기부 페이지</h2>
        <p id="donation-desc">기부 방식을 로딩 중입니다...</p>
        <div id="donation-ui" class="donation-box"></div>
        <button onclick="openSignupModal()" style="background-color: #e63946;">기부 완료하기</button>
    </div>

    <div id="view-survey" class="hidden">
        <h2>의견 제출 (마지막!)</h2>
        <p>실제 결제는 일어나지 않았으니 안심하세요.<br>아래 설문에 응해주시면 큰 도움이 됩니다.</p>
        
        <hr style="border: 0.5px solid #eee; margin: 20px 0;">
        
        <p style="text-align: left; font-weight: bold; margin-bottom: 0;">1. 방금 체험하신 기부 방식은 얼마나 편리했나요?</p>
        <div class="stars">
            <input type="radio" id="st5" name="rating" value="5"><label for="st5">★</label>
            <input type="radio" id="st4" name="rating" value="4"><label for="st4">★</label>
            <input type="radio" id="st3" name="rating" value="3"><label for="st3">★</label>
            <input type="radio" id="st2" name="rating" value="2"><label for="st2">★</label>
            <input type="radio" id="st1" name="rating" value="1"><label for="st1">★</label>
        </div>

        <p style="text-align: left; font-weight: bold; margin: 20px 0 5px 0;">2. 모든 방식 중 가장 편리해 보이는 방식은?</p>
        <select id="best-type-select">
            <option value="">선택해주세요</option>
            <option value="정기">정기 기부 (매달 정기 자동 이체)</option>
            <option value="일회성">일회성 기부 (원할 때 한 번만 결제)</option>
            <option value="크라우드 펀딩">크라우드 펀딩 (목표 금액 달성 시 기부)</option>
            <option value="매칭">매칭 기부 (내가 낸 만큼 기업이 더블 기부)</option>
            <option value="신용카드 포인트">신용카드 포인트 기부 (소멸 예정 포인트 활용)</option>
        </select>

        <button onclick="handleSurveySubmit()" style="margin-top: 20px;">설문 제출하고 마치기</button>
    </div>

    <div id="view-thanks" class="hidden">
        <h2>참여해주셔서 감사합니다!</h2>
        <p>제출하신 소중한 데이터는 UI/UX 분석 연구 목적으로만 활용됩니다.</p>
    </div>
</div>

<div id="signup-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>회원가입하셔야<br>기부가 가능합니다.</h3>
        
        <div class="gender-group">
            <input type="radio" id="g-male" name="gender" value="남성">
            <label for="g-male">남성</label>
            <input type="radio" id="g-female" name="gender" value="여성">
            <label for="g-female">여성</label>
        </div>
        
        <select id="age-select">
            <option value="">나이대를 선택해주세요</option>
            <option value="10대">10대</option>
            <option value="20대">20대</option>
            <option value="30대">30대</option>
            <option value="40대">40대</option>
            <option value="50대 이상">50대 이상</option>
        </select>

        <div class="consent-box">
            <input type="checkbox" id="privacy-agree">
            <label for="privacy-agree">실제 회원가입이 아니며 성별, 연령 외의 정보는 수집하지 않습니다. 수집된 정보는 연구 목적으로만 활용됩니다.</label>
        </div>

        <button onclick="processDonation()">입력 완료 및 기부하기</button>
        
        <a href="https://google.com" style="display: block; margin-top: 15px; font-size: 12px; color: #999; text-decoration: none;">기부하지 않고 나가기</a>
    </div>
</div>

<script>
    // ⚠️ [필수] 여기에 본인의 파이어베이스 설정을 붙여넣으세요!
const firebaseConfig = {
  apiKey: "AIzaSyDh2Rin87cRXVxf5eTidxnrO93x0M7e4Dc",
  authDomain: "globalcitizenship-271c4.firebaseapp.com",
  projectId: "globalcitizenship-271c4",
  storageBucket: "globalcitizenship-271c4.firebasestorage.app",
  messagingSenderId: "360209413011",
  appId: "1:360209413011:web:d4715a7bf7ec2daf056e66"
};    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const types = ['정기', '일회성', '크라우드 펀딩', '매칭', '신용카드 포인트'];
    let assignedType = localStorage.getItem('assignedType');
    let visitDocId = localStorage.getItem('visitDocId'); // 방문 기록 ID
    let hasSurveyed = localStorage.getItem('hasSurveyed') === 'true';

    const typeContent = {
        '정기': { title: '정기 기부', desc: '매달 정기적으로 따뜻한 마음을 나누어 주세요.', ui: '💳 매월 자동으로 10,000원 정기 후원 신청' },
        '일회성': { title: '일회성 기부', desc: '부담 없이 한 번만 원하시는 만큼 기부하실 수 있습니다.', ui: '💰 일회성 10,000원 즉시 후원' },
        '크라우드 펀딩': { title: '크라우드 펀딩 기부', desc: '목표 금액이 달성되면 프로젝트가 실행되고 기부금이 전달됩니다.', ui: '📈 목표 달성률 85% - 펀딩 참여하기' },
        '매칭': { title: '매칭 기부', desc: '여러분이 1천 원을 기부하면 기업에서 똑같이 1천 원을 더해 총 2천 원이 기부됩니다.', ui: '🤝 기업 매칭 (나 5,000원 + 기업 5,000원) 참여' },
        '신용카드 포인트': { title: '신용카드 포인트 기부', desc: '소멸 예정인 카드 포인트를 모아 가치 있게 기부할 수 있습니다.', ui: '✨ 보유 포인트 확인 및 전액 기부 (12,400P)' }
    };

   
  // 기존 코드 위치를 찾아서 아래 블록으로 덮어쓰기 하세요!
    window.onload = function() {
        // 🔥 [개발자 테스트 모드] 새로고침할 때마다 무조건 랜덤하게 처음부터 보려면 아래 4줄의 주석(//)을 지우세요!
        localStorage.clear();
        assignedType = types[Math.floor(Math.random() * types.length)];
        visitDocId = null;
        hasSurveyed = false;

        // 이미 설문까지 마친 유저라면 완료 화면 표시
        if (hasSurveyed) {
            showView('view-thanks');
            return;
        }

        // 1. 기부 방식 배정
        if (!assignedType) {
            const randomIndex = Math.floor(Math.random() * types.length);
            assignedType = types[randomIndex];
            localStorage.setItem('assignedType', assignedType);
        }
        setupDonationPage();

        // 2. 페이지 접속 기록 남기기
        if (!visitDocId) {
            db.collection("donations").add({
                type: assignedType,
                gender: "미입력",
                age: "미입력",
                hasDonated: false,
                rating: null,
                bestType: null,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then((docRef) => {
                visitDocId = docRef.id;
                localStorage.setItem('visitDocId', visitDocId);
            });
        }
    };

    function setupDonationPage() {
        const content = typeContent[assignedType];
        document.getElementById('donation-title').innerText = content.title;
        document.getElementById('donation-desc').innerText = content.desc;
        document.getElementById('donation-ui').innerText = content.ui;
    }

    function showView(viewId) {
        document.getElementById('view-donation').classList.add('hidden');
        document.getElementById('view-survey').classList.add('hidden');
        document.getElementById('view-thanks').classList.add('hidden');
        document.getElementById(viewId).classList.remove('hidden');
    }

    // 팝업창 띄우기
    function openSignupModal() {
        document.getElementById('signup-modal').classList.remove('hidden');
    }

    // 팝업창에서 정보 입력 후 기부 처리
    function processDonation() {
        const genderNode = document.querySelector('input[name="gender"]:checked');
        const age = document.getElementById('age-select').value;
        const isAgreed = document.getElementById('privacy-agree').checked;

        if (!genderNode || !age) {
            alert('성별과 나이대를 선택해주세요.');
            return;
        }
        if (!isAgreed) {
            alert('정보 수집 항목에 체크해주셔야 진행이 가능합니다.');
            return;
        }

        // 방문 기록 문서 업데이트 (입력한 성별, 나이 기록 및 기부 완료로 변경)
        db.collection("donations").doc(visitDocId).update({
            gender: genderNode.value,
            age: age,
            hasDonated: true
        })
        .then(() => {
            // 모달창 숨기고 설문조사로 이동
            document.getElementById('signup-modal').classList.add('hidden');
            showView('view-survey');
        })
        .catch((error) => console.error("업데이트 에러: ", error));
    }

    // 설문조사 제출
    function handleSurveySubmit() {
        const ratingNode = document.querySelector('input[name="rating"]:checked');
        const bestType = document.getElementById('best-type-select').value;

        if (!ratingNode || !bestType) {
            alert('두 문항 모두 성실히 답해 주셔야 제출 가능합니다!');
            return;
        }

        db.collection("donations").doc(visitDocId).update({
            rating: parseInt(ratingNode.value),
            bestType: bestType
        })
        .then(() => {
            localStorage.setItem('hasSurveyed', 'true');
            showView('view-thanks');
        })
        .catch((error) => console.error("설문 제출 에러: ", error));
    }
</script>

</body>
</html>
